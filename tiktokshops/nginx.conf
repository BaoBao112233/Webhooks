# TikTok Shop Webhooks - Nginx Configuration
# Place this file in /etc/nginx/sites-available/tiktok-webhooks
# Then create a symlink: sudo ln -s /etc/nginx/sites-available/tiktok-webhooks /etc/nginx/sites-enabled/

upstream tiktok_webhooks {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name webhooks.oxiitektiktokshop.com www.webhooks.oxiitektiktokshop.com;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$server_name$request_uri;

    # For testing without SSL
    location / {
        proxy_pass http://tiktok_webhooks;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeout for webhook processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logging
    access_log /var/log/nginx/tiktok-webhooks-access.log;
    error_log /var/log/nginx/tiktok-webhooks-error.log;
}

